<script>
async function loadFromComfy() {
    console.log("Loading image from buffer...");
    try {
        const response = await fetch("/mypaint/get_buffer");
        if (!response.ok) return; 
        const blob = await response.blob();
        
        const img = new Image();
        img.onload = () => console.log('Original image size:', img.width, img.height);
        img.src = URL.createObjectURL(blob);

        const file = new File([blob], "image.png", { type: "image/png" });
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        const dropEvent = new DragEvent("drop", {
            bubbles: true,
            cancelable: true,
            dataTransfer: dataTransfer
        });
        const target = document.getElementById('canvas_minipaint') || document;
        target.dispatchEvent(dropEvent);

        setTimeout(() => {
            const canvas = document.getElementById('canvas_minipaint');
            if(canvas) console.log('Canvas size after load:', canvas.width, canvas.height);
        }, 500);
    } catch (e) {
        console.error("Load failed:", e);
    }
}

window.addEventListener("message", (event) => {
    if (event.data && event.data.type === "RELOAD_BUFFER") {
        console.log("Remote signal received: Reloading buffer...");
        loadFromComfy(); 
    }
});

// Function to create the button using exportToComfy
function createSaveButton() {
    if (document.getElementById("comfy_save_btn")) return;
    const btn = document.createElement("button");
    btn.id = "comfy_save_btn";
    btn.innerHTML = "💾 SAVE TO COMFY";
    btn.style = "position:fixed; top:10px; left:50%; transform:translateX(-50%); z-index:10000; padding:10px 20px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);";
    
    btn.onclick = async () => {
        btn.innerHTML = "⏳ SAVING...";
        let dataUrl = null;
        
        // Use the new exportToComfy method if available
        if (window.file_save && typeof window.file_save.exportToComfy === 'function') {
            try {
                dataUrl = window.file_save.exportToComfy();
                console.log("Exported via file_save.exportToComfy");
            } catch(e) {
                console.error("exportToComfy failed", e);
            }
        }
        
        // Fallback to old method (in case the method hasn't appeared yet)
        if (!dataUrl) {
            const canvas = document.getElementById('canvas_minipaint');
            if (canvas) {
                dataUrl = canvas.toDataURL("image/png");
                console.warn("Using fallback canvas.toDataURL");
            }
        }
        
        if (!dataUrl) {
            btn.innerHTML = "❌ NO DATA";
            setTimeout(() => {
                btn.innerHTML = "💾 SAVE TO COMFY";
                btn.style.background = "#007bff";
            }, 2000);
            return;
        }
        
        try {
            const resp = await fetch("/mypaint/save_back", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: dataUrl })
            });
            const result = await resp.json();
            if (resp.ok && window.opener) {
                window.opener.postMessage({ type: "MINIPAINT_SAVED", filename: result.filename }, "*");
                btn.innerHTML = "✅ SAVED!";
                btn.style.background = "#28a745";
            } else {
                throw new Error("Save failed");
            }
        } catch (e) {
            console.error(e);
            btn.innerHTML = "❌ ERROR";
            btn.style.background = "#dc3545";
        }
        setTimeout(() => {
            btn.innerHTML = "💾 SAVE TO COMFY";
            btn.style.background = "#007bff";
        }, 2000);
    };
    document.body.appendChild(btn);
}

// Wait for window.file_save to appear before creating the button
let saveButtonCreated = false;
function waitForFileSave() {
    if (window.file_save && typeof window.file_save.exportToComfy === 'function') {
        if (!saveButtonCreated) {
            createSaveButton();
            saveButtonCreated = true;
            console.log("Save button created after file_save ready");
        }
    } else {
        setTimeout(waitForFileSave, 100);
    }
}

window.addEventListener('load', () => {
    waitForFileSave();
    // Load image after 2 seconds (as before)
    setTimeout(loadFromComfy, 2000);
});
</script>
